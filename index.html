<script>
  var links = [
    "https://getmysocial.com/andhannah",
    "https://getmysocial.com/lantmadison",
    "https://getmysocial.com/vichannah",
    "https://getmysocial.com/diegmadison",
    "https://getmysocial.com/nanhannah"
  ];

  // Rotation locale
  var index = localStorage.getItem("rotIndex");
  if(index === null) index = 0;
  else index = parseInt(index);

  var selectedLink = links[index];

  var nextIndex = (index + 1) % links.length;
  localStorage.setItem("rotIndex", nextIndex);

  // 👉 Redirection seulement après interaction
  function go() {
    window.location.href = selectedLink;
  }
</script>

  body {
